name: Windows Build and Release

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing version tag to publish, such as v1.0.0 (leave empty to build artifacts only)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-windows:
    name: Build portable app and EXE installer
    runs-on: windows-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          # Manual release runs build the exact tagged revision being published.
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          java-package: jdk

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Fine-grained cache for dependencies, wrapper distributions, and task outputs.
          cache-provider: enhanced
          gradle-version: "9.6.1"

      - name: Configure parallel Gradle workers
        shell: pwsh
        run: |
          $workers = [System.Environment]::ProcessorCount
          "GRADLE_MAX_WORKERS=$workers" >> $env:GITHUB_ENV
          Write-Host "Gradle will use $workers parallel worker(s) with the build cache enabled."

      - name: Read and validate version
        id: version
        shell: pwsh
        env:
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          $match = Select-String -LiteralPath "build.gradle.kts" -Pattern '^\s*version\s*=\s*"([^"]+)"'
          if ($null -eq $match -or $match.Matches.Count -eq 0) {
            throw "Could not read the application version from build.gradle.kts."
          }
          $appVersion = $match.Matches[0].Groups[1].Value
          "version=$appVersion" >> $env:GITHUB_OUTPUT

          $releaseTag = ""
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $releaseTag = $env:GITHUB_REF_NAME
          } elseif (-not [string]::IsNullOrWhiteSpace($env:REQUESTED_RELEASE_TAG)) {
            $releaseTag = $env:REQUESTED_RELEASE_TAG.Trim()
          }

          if (-not [string]::IsNullOrWhiteSpace($releaseTag)) {
            $expectedTag = "v$appVersion"
            if ($releaseTag -ne $expectedTag) {
              throw "Release tag '$releaseTag' does not match Gradle version '$appVersion'. Expected '$expectedTag'."
            }
          }
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - name: Locate WiX Toolset 3
        shell: pwsh
        run: |
          $candle = Get-Command candle.exe -ErrorAction SilentlyContinue
          $light = Get-Command light.exe -ErrorAction SilentlyContinue

          if ($null -eq $candle -or $null -eq $light) {
            $searchRoot = ${env:ProgramFiles(x86)}
            $candleFile = Get-ChildItem -LiteralPath $searchRoot -Filter candle.exe -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*WiX Toolset*\bin\candle.exe" } |
              Select-Object -First 1
            if ($null -eq $candleFile) {
              throw "WiX Toolset 3 candle.exe was not found on the Windows runner."
            }

            $wixBin = $candleFile.Directory.FullName
            if (-not (Test-Path -LiteralPath (Join-Path $wixBin "light.exe"))) {
              throw "WiX light.exe was not found beside candle.exe in '$wixBin'."
            }
            $wixBin >> $env:GITHUB_PATH
          }

      - name: Build and test portable application
        shell: pwsh
        run: |
          .\packaging\build-windows-release.ps1 `
            -JpackagePath (Join-Path $env:JAVA_HOME "bin\jpackage.exe") `
            -MaxWorkers $env:GRADLE_MAX_WORKERS

      - name: Build single-file EXE installer
        shell: pwsh
        run: |
          .\packaging\build-windows-installer.ps1 `
            -PackageType exe `
            -JpackagePath (Join-Path $env:JAVA_HOME "bin\jpackage.exe") `
            -SkipPortableBuild

      - name: Create checksums
        shell: pwsh
        run: |
          $files = @(
            Get-ChildItem -LiteralPath "build\release" -Filter "MacroOverlay-Windows-x64-*.zip" -File
            Get-ChildItem -LiteralPath "build\release\installers" -Filter "*.exe" -File
          )
          if ($files.Count -lt 2) {
            throw "Expected both the portable ZIP and EXE installer."
          }

          $checksums = foreach ($file in $files) {
            $hash = (Get-FileHash -LiteralPath $file.FullName -Algorithm SHA256).Hash
            "$hash  $($file.Name)"
          }
          $checksums | Set-Content -LiteralPath "build\release\SHA256SUMS.txt" -Encoding ascii
          $checksums | ForEach-Object { Write-Host $_ }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MacroOverlay-Windows-${{ steps.version.outputs.version }}
          path: |
            build/release/MacroOverlay-Windows-x64-*.zip
            build/release/installers/*.exe
            build/release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub Release
    if: needs.build-windows.outputs.release_tag != ''
    needs: build-windows
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: MacroOverlay-Windows-${{ needs.build-windows.outputs.version }}
          path: release-assets

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-windows.outputs.release_tag }}
        run: |
          $assets = Get-ChildItem -LiteralPath "release-assets" -Recurse -File |
            Where-Object { $_.Extension -in @(".zip", ".exe") -or $_.Name -eq "SHA256SUMS.txt" } |
            Select-Object -ExpandProperty FullName
          if ($assets.Count -lt 3) {
            throw "Expected a portable ZIP, EXE installer, and checksum file."
          }

          gh release view $env:RELEASE_TAG `
            --repo "$env:GITHUB_REPOSITORY" `
            --json tagName *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release upload $env:RELEASE_TAG @assets `
              --repo "$env:GITHUB_REPOSITORY" `
              --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload assets to existing release '$env:RELEASE_TAG'."
            }

            gh release edit $env:RELEASE_TAG `
              --repo "$env:GITHUB_REPOSITORY" `
              --title "Macro Overlay ${{ needs.build-windows.outputs.version }}" `
              --latest
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update existing release '$env:RELEASE_TAG'."
            }
          } else {
            gh release create $env:RELEASE_TAG @assets `
              --repo "$env:GITHUB_REPOSITORY" `
              --verify-tag `
              --generate-notes `
              --latest `
              --title "Macro Overlay ${{ needs.build-windows.outputs.version }}"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create release '$env:RELEASE_TAG'."
            }
          }
